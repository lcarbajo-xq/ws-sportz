<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="apple-touch-icon" href="/vite.svg" />

    <!-- Primary Meta Tags -->
    <title>Sportz | Live Scores & Real-Time Match Action</title>
    <meta
      name="title"
      content="Sportz | Live Scores & Real-Time Match Action" />
    <meta
      name="description"
      content="Experience sports like never before. Real-time scores, live commentary, and instant updates across football, basketball, cricket and more." />
    <meta
      name="keywords"
      content="live sports, real-time scores, match commentary, football, basketball, cricket, live updates" />
    <meta name="author" content="Sportz" />
    <meta name="robots" content="index, follow" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#facc15" />
    <meta name="msapplication-TileColor" content="#facc15" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://sportz.app/" />
    <meta
      property="og:title"
      content="Sportz | Live Scores & Real-Time Match Action" />
    <meta
      property="og:description"
      content="Experience sports like never before. Real-time scores, live commentary, and instant updates." />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://sportz.app/" />
    <meta
      property="twitter:title"
      content="Sportz | Live Scores & Real-Time Match Action" />
    <meta
      property="twitter:description"
      content="Experience sports like never before. Real-time scores, live commentary, and instant updates." />
    <meta property="twitter:image" content="/og-image.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet" />
